name: MLX Real Phase Model-Family Benchmark

on:
  workflow_dispatch:

jobs:
  mlx-real-phase:
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Reset workspace
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf results smoke .venv
          mkdir -p results smoke

      - name: Environment diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          {
            echo "# MLX Real Phase Benchmark Environment"
            date
            uname -a
            sw_vers
            system_profiler SPHardwareDataType || true
            system_profiler SPDisplaysDataType || true
            sysctl -n machdep.cpu.brand_string || true
            sysctl -n hw.ncpu || true
            sysctl hw.memsize || true
            which python3
            python3 --version
          } | tee results/00_environment.md

      - name: Install MLX dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install mlx mlx-lm numpy pandas psutil

          python - <<'PY' | tee results/python_packages.txt
          import importlib.metadata as m
          for p in ["mlx", "mlx-lm", "numpy", "pandas", "psutil"]:
              print(p, m.version(p))
          PY

      - name: Verify MLX backend
        shell: bash
        run: |
          set -euxo pipefail
          source .venv/bin/activate

          python - <<'PY' | tee results/backend_verification.txt
          import mlx.core as mx
          print("default_device:", mx.default_device())
          a = mx.ones((1024, 1024), dtype=mx.float16)
          b = a @ a
          mx.eval(b)
          print("fp16_tensor_test:", b.shape)
          print("backend_verification: PASS")
          PY

      - name: MLX model-family real generation benchmark
        shell: bash
        continue-on-error: true
        run: |
          set -euxo pipefail
          source .venv/bin/activate

          cat > smoke/mlx_model_family_bench.py <<'PY'
          import json
          import os
          import time
          import statistics
          import psutil
          import mlx.core as mx
          from mlx_lm import load, generate

          MODELS = [
              {
                  "family": "Qwen",
                  "name": "Qwen2.5-0.5B-Instruct-4bit",
                  "repo": "mlx-community/Qwen2.5-0.5B-Instruct-4bit",
              },
              {
                  "family": "Llama",
                  "name": "Llama-3.2-1B-Instruct-4bit",
                  "repo": "mlx-community/Llama-3.2-1B-Instruct-4bit",
              },
              {
                  "family": "Gemma",
                  "name": "Gemma-2-2B-it-4bit",
                  "repo": "mlx-community/gemma-2-2b-it-4bit",
              },
              {
                  "family": "Phi",
                  "name": "Phi-3.5-mini-instruct-4bit",
                  "repo": "mlx-community/Phi-3.5-mini-instruct-4bit",
              },
          ]

          PROMPTS = [
              {
                  "prompt_name": "short",
                  "prompt": "Explain local LLM inference performance in one sentence.",
              },
              {
                  "prompt_name": "medium",
                  "prompt": "Explain why local LLM inference performance depends on prefill, decode, context length, KV-cache behavior, quantization, memory footprint, and backend runtime overhead.",
              },
              {
                  "prompt_name": "long",
                  "prompt": "Write a detailed explanation of local LLM inference performance. Discuss prefill behavior, decode behavior, context-length scaling, KV-cache growth, quantization, memory footprint, runtime overhead, and why different accelerator ecosystems such as CUDA, Vulkan, MLX, and SYCL can show different performance behavior.",
              },
          ]

          MAX_TOKENS = [64, 128, 256]
          REPEATS = 3

          proc = psutil.Process(os.getpid())

          def rss_mb():
              return proc.memory_info().rss / 1024 / 1024

          def summarize(xs):
              if not xs:
                  return {}
              return {
                  "mean": statistics.mean(xs),
                  "median": statistics.median(xs),
                  "min": min(xs),
                  "max": max(xs),
                  "stddev": statistics.stdev(xs) if len(xs) > 1 else 0.0,
                  "cv_percent": statistics.stdev(xs) / statistics.mean(xs) * 100 if len(xs) > 1 and statistics.mean(xs) > 0 else 0.0,
              }

          all_rows = []

          for model_info in MODELS:
              print("=" * 80)
              print("LOADING MODEL:", model_info["repo"])
              print("=" * 80)

              try:
                  t0 = time.perf_counter()
                  model, tokenizer = load(model_info["repo"])
                  load_s = time.perf_counter() - t0
                  load_ok = True
                  load_error = None
              except Exception as e:
                  all_rows.append({
                      "family": model_info["family"],
                      "model_name": model_info["name"],
                      "repo": model_info["repo"],
                      "load_ok": False,
                      "error": repr(e),
                  })
                  continue

              for prompt_info in PROMPTS:
                  prompt = prompt_info["prompt"]
                  try:
                      prompt_tokens = len(tokenizer.encode(prompt))
                  except Exception:
                      prompt_tokens = None

                  for max_tokens in MAX_TOKENS:
                      trial_rows = []

                      for repeat in range(REPEATS):
                          rss_before = rss_mb()
                          t1 = time.perf_counter()

                          try:
                              text = generate(
                                  model,
                                  tokenizer,
                                  prompt=prompt,
                                  max_tokens=max_tokens,
                                  verbose=False,
                              )
                              ok = True
                              error = None
                          except Exception as e:
                              text = ""
                              ok = False
                              error = repr(e)

                          gen_s = time.perf_counter() - t1
                          rss_after = rss_mb()

                          try:
                              output_tokens = len(tokenizer.encode(text))
                          except Exception:
                              output_tokens = None

                          row = {
                              "backend": "MLX",
                              "device": str(mx.default_device()),
                              "family": model_info["family"],
                              "model_name": model_info["name"],
                              "repo": model_info["repo"],
                              "load_ok": load_ok,
                              "load_seconds_first_load": load_s,
                              "prompt_name": prompt_info["prompt_name"],
                              "prompt_chars": len(prompt),
                              "prompt_tokens": prompt_tokens,
                              "max_tokens": max_tokens,
                              "repeat": repeat,
                              "generation_ok": ok,
                              "generation_seconds": gen_s,
                              "output_chars": len(text),
                              "output_tokens_estimated": output_tokens,
                              "estimated_output_tokens_per_second": output_tokens / gen_s if output_tokens and gen_s > 0 else None,
                              "chars_per_second": len(text) / gen_s if gen_s > 0 else None,
                              "rss_before_mb": rss_before,
                              "rss_after_mb": rss_after,
                              "rss_delta_mb": rss_after - rss_before,
                              "error": error,
                              "output_preview": text[:300],
                          }

                          all_rows.append(row)
                          trial_rows.append(row)

                      tok_s_values = [
                          r["estimated_output_tokens_per_second"]
                          for r in trial_rows
                          if r.get("estimated_output_tokens_per_second") is not None
                      ]

                      summary = summarize(tok_s_values)
                      all_rows.append({
                          "backend": "MLX",
                          "row_type": "summary",
                          "family": model_info["family"],
                          "model_name": model_info["name"],
                          "repo": model_info["repo"],
                          "prompt_name": prompt_info["prompt_name"],
                          "prompt_tokens": prompt_tokens,
                          "max_tokens": max_tokens,
                          "repeats": REPEATS,
                          "tok_s_mean": summary.get("mean"),
                          "tok_s_median": summary.get("median"),
                          "tok_s_min": summary.get("min"),
                          "tok_s_max": summary.get("max"),
                          "tok_s_stddev": summary.get("stddev"),
                          "tok_s_cv_percent": summary.get("cv_percent"),
                      })

              del model
              del tokenizer
              mx.metal.clear_cache()

          with open("results/mlx_model_family_generation.json", "w") as f:
              json.dump(all_rows, f, indent=2)

          print(json.dumps(all_rows, indent=2))
          PY

          python smoke/mlx_model_family_bench.py | tee results/mlx_model_family_generation.log

      - name: Generate MLX report
        if: always()
        shell: bash
        run: |
          set -euxo pipefail

          cat > smoke/report.py <<'PY'
          import json
          from pathlib import Path

          base = Path("results")

          def load_json(name):
              p = base / name
              if not p.exists():
                  return []
              txt = p.read_text(errors="replace").strip()
              starts = [i for i in [txt.find("["), txt.find("{")] if i >= 0]
              if starts:
                  txt = txt[min(starts):]
              try:
                  data = json.loads(txt)
                  return data if isinstance(data, list) else [data]
              except Exception:
                  return []

          rows = load_json("mlx_model_family_generation.json")
          summaries = [r for r in rows if r.get("row_type") == "summary"]
          trials = [r for r in rows if r.get("generation_ok") is not None]

          lines = []
          lines.append("# MLX Model-Family End-to-End Inference Report")
          lines.append("")
          lines.append("## Aim")
          lines.append("")
          lines.append("This workflow tests MLX-only end-to-end generation across multiple model families. It is intended as the Apple/Metal counterpart to the CUDA/Vulkan llama.cpp phase benchmarks.")
          lines.append("")
          lines.append("## Environment")
          lines.append("")
          lines.append("```text")
          lines.append((base / "00_environment.md").read_text(errors="replace") if (base / "00_environment.md").exists() else "missing")
          lines.append("```")
          lines.append("")
          lines.append("## Backend Verification")
          lines.append("")
          lines.append("```text")
          lines.append((base / "backend_verification.txt").read_text(errors="replace") if (base / "backend_verification.txt").exists() else "missing")
          lines.append("```")
          lines.append("")
          lines.append("## Software Stack")
          lines.append("")
          lines.append("```text")
          lines.append((base / "python_packages.txt").read_text(errors="replace") if (base / "python_packages.txt").exists() else "missing")
          lines.append("```")
          lines.append("")
          lines.append("## Summary Results")
          lines.append("")
          lines.append("| Family | Model | Prompt | Prompt tokens | Max tokens | Mean tok/s | Median tok/s | CV % |")
          lines.append("|---|---|---|---:|---:|---:|---:|---:|")

          for r in summaries:
              def fmt(x):
                  return "n/a" if x is None else f"{float(x):.2f}"
              lines.append(
                  f"| {r.get('family')} | {r.get('model_name')} | {r.get('prompt_name')} | {r.get('prompt_tokens')} | {r.get('max_tokens')} | {fmt(r.get('tok_s_mean'))} | {fmt(r.get('tok_s_median'))} | {fmt(r.get('tok_s_cv_percent'))} |"
              )

          lines.append("")
          lines.append("## Research Interpretation")
          lines.append("")
          lines.append("This MLX-only run establishes whether Apple/Metal end-to-end generation behaves consistently across model families and prompt lengths. The next step is to add MLX prefill/decode phase timing and compare prediction error against the CUDA result, where phase-level proxies predicted full inference within 2.33% for prefill and 0.97% for decode.")
          lines.append("")
          lines.append("## Threats to Validity")
          lines.append("")
          lines.append("- GitHub macOS 26 uses a virtual Apple M1 runner with limited CPU cores and memory.")
          lines.append("- Token/s is estimated from tokenizer output length.")
          lines.append("- Generation timing is wall-clock and does not yet separate prefill and decode.")
          lines.append("- Hosted-runner thermal/power telemetry is limited.")
          lines.append("")
          lines.append("## Raw Trial Count")
          lines.append("")
          lines.append(f"- Trial rows: {len(trials)}")
          lines.append(f"- Summary rows: {len(summaries)}")
          lines.append("")

          report = "\n".join(lines)
          (base / "MLX_MODEL_FAMILY_REPORT.md").write_text(report)
          print(report)
          PY

          python3 smoke/report.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-model-family-end-to-end-results
          path: results/
